services:
  # ==========================================================================
  # Backend Service — Django + Gunicorn
  # ==========================================================================
  - type: web
    name: support-ticket-backend
    env: python
    region: ohio  # Change to your preferred region
    plan: starter  # Start with starter, upgrade as needed
    
    # Source code
    repo: https://github.com/luxmikant/tickets_support_system.git  # Replace with your repo
    branch: main  # Change to your deployment branch
    
    # Root directory where the application lives (if not at repo root)
    rootDir: backend
    
    # Build command
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py makemigrations --noinput
      python manage.py migrate --noinput
    
    # Start command — use Gunicorn with config
    startCommand: gunicorn -c gunicorn.conf.py config.wsgi:application
    
    # Health check
    healthCheckPath: /api/tickets/
    
    # Port
    numInstances: 1
    
    # Environment variables (Supabase PostgreSQL)
    envVars:
      # Django settings
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.render
      
      - key: DJANGO_SECRET_KEY
        sync: false  # 🔒 Set in Render dashboard (from generate_secret_key.py)
      
      - key: DJANGO_ALLOWED_HOSTS
        value: support-ticket-backend.onrender.com
        # Update to your actual Render domain after first deploy
      
      # PostgreSQL — Supabase Connection
      - key: POSTGRES_ENGINE
        value: django.db.backends.postgresql
      
      - key: POSTGRES_DB
        value: postgres  # From your Supabase connection string
      
      - key: POSTGRES_USER
        value: postgres.gadxxxarhgjcvirmjupp  # Supabase Connection Pooler user
      
      - key: POSTGRES_PASSWORD
        sync: false  # 🔒 Set in Render dashboard: CWgRmUvtFQfdxrwa (pooler password)
      
      - key: POSTGRES_HOST
        value: aws-1-ap-southeast-1.pooler.supabase.com  # Supabase Connection Pooler (IPv4 only)
      
      - key: POSTGRES_PORT
        value: "6543"  # Connection Pooler port
      
      # LLM API Keys (Google Gemini)
      - key: GEMINI_API_KEY
        sync: false  # 🔒 Set in Render dashboard as Secret
      
      # Gunicorn workers
      - key: GUNICORN_WORKERS
        value: "2"  # Adjust based on your plan (2-4 for Free/Starter)
      
      # CORS settings (if frontend is separate)
      - key: CORS_ALLOWED_ORIGINS
        value: http://localhost:3000
        # Update after deploying frontend
      
      # Debug mode
      - key: DEBUG
        value: "false"
      
      # Security headers
      - key: SECURE_BROWSER_XSS_FILTER
        value: "true"
      
      - key: SECURE_CONTENT_TYPE_NOSNIFF
        value: "true"

# =============================================================================
# NOTE: Database service is NOT needed — using Supabase PostgreSQL instead
# If you want to use Render's managed PostgreSQL instead of Supabase, 
# uncomment the service below and update the backend service to use 
# fromDatabase references
# =============================================================================
