services:
  # ==========================================================================
  # Backend Service — Django + Gunicorn
  # ==========================================================================
  - type: web
    name: support-ticket-backend
    env: python
    region: ohio  # Change to your preferred region
    plan: starter  # Start with starter, upgrade as needed
    
    # Source code
    repo: https://github.com/luxmikant/tickets_support_system.git  # Replace with your repo
    branch: main  # Change to your deployment branch
    
    # Root directory where the application lives (if not at repo root)
    rootDir: backend
    
    # Build command
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py makemigrations --noinput
      python manage.py migrate --noinput
    
    # Start command — use Gunicorn with config
    startCommand: gunicorn -c gunicorn.conf.py config.wsgi:application
    
    # Health check
    healthCheckPath: /api/tickets/
    
    # Port
    numInstances: 1
    
    # Environment variables (reference Supabase connection string and secrets)
    envVars:
      # Django settings
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      
      - key: DJANGO_SECRET_KEY
        sync: false
      
      - key: DJANGO_ALLOWED_HOSTS
        value: support-ticket-backend.onrender.com,localhost,127.0.0.1
        # Update to your actual Render domain once deployed
      
      # PostgreSQL (Supabase)
      - key: POSTGRES_ENGINE
        value: django.db.backends.postgresql
      
      - key: POSTGRES_DB
        fromDatabase:
          name: tickets-db  # Reference to your database service (if using Render DB)
          property: database
        # OR use Supabase directly (uncomment if not using Render DB):
        # value: postgres
      
      - key: POSTGRES_USER
        fromDatabase:
          name: tickets-db
          property: username
        # OR Supabase user:
        # sync: false
      
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: tickets-db
          property: password
        # OR Supabase password (sync: false, store in secrets):
        # sync: false
      
      - key: POSTGRES_HOST
        fromDatabase:
          name: tickets-db
          property: host
        # OR use Supabase host (e.g., db.xxx.supabase.co):
        # sync: false
      
      - key: POSTGRES_PORT
        fromDatabase:
          name: tickets-db
          property: port
        # OR hardcode Supabase port:
        # value: "5432"
      
      # LLM API Keys (Google Gemini)
      - key: GEMINI_API_KEY
        sync: false  # Set this in the Render dashboard as a secret
      
      # Gunicorn workers
      - key: GUNICORN_WORKERS
        value: "2"  # Adjust based on your plan
      
      # CORS settings (if frontend is separate)
      - key: CORS_ALLOWED_ORIGINS
        value: >
          http://localhost:3000,
          https://support-ticket-frontend.onrender.com

